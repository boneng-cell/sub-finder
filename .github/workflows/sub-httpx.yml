name: Subdomain + HTTPx Scan
on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Target domain"
        required: true
        type: string
      pd_api_key:
        description: "ProjectDiscovery API Key"
        required: true
        type: string
jobs:
  recon-httpx:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Cache Python deps
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install Python deps
      run: pip install -r requirements.txt
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-mod-
    - name: Cache Go binaries
      uses: actions/cache@v4
      with:
        path: ~/go/bin
        # Tambahkan versi tools untuk invalidate cache jika perlu update
        key: ${{ runner.os }}-go-bin-v2-${{ hashFiles('tools_version.txt') }}
        restore-keys: |
          ${{ runner.os }}-go-bin-
    - name: Add Go bin to PATH
      run: echo "$HOME/go/bin" >> $GITHUB_PATH
    - name: Check and install missing tools
      run: |
        # Buat file versi tools untuk tracking
        cat > tools_version.txt << EOF
        subfinder@latest
        assetfinder@latest
        amass@master
        chaos@latest
        httpx@latest
        EOF
        
        # Fungsi untuk cek apakah tool sudah ada
        check_and_install() {
          if ! command -v $1 &> /dev/null; then
            echo "Installing $1..."
            go install $2
          else
            echo "$1 already installed, skipping..."
          fi
        }
        
        # Install hanya yang belum ada
        check_and_install subfinder github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
        check_and_install assetfinder github.com/tomnomnom/assetfinder@latest
        check_and_install amass github.com/owasp-amass/amass/v3/...@master
        check_and_install chaos github.com/projectdiscovery/chaos-client/cmd/chaos@latest
        check_and_install httpx github.com/projectdiscovery/httpx/cmd/httpx@latest
    - name: Run scan
      env:
        PD_API_KEY: ${{ github.event.inputs.pd_api_key }}
      run: python3 sub_scan.py "${{ github.event.inputs.domain }}"
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: results-${{ github.event.inputs.domain }}
        path: |
          ${{ github.event.inputs.domain }}/*.txt
        retention-days: 30
