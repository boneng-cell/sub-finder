name: Subdomain Recon
on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Target domain"
        required: true
      pd_api_key:
        description: "ProjectDiscovery API Key"
        required: true
jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Cache Python deps
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install Python deps
      run: pip install -r requirements.txt
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
    - name: Cache Go Modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-mod
    - name: Cache Go Bin
      uses: actions/cache@v4
      with:
        path: ~/go/bin
        key: ${{ runner.os }}-go-bin
    - name: Add Go bin to PATH
      run: echo "$HOME/go/bin" >> $GITHUB_PATH
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl
        go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
        go install github.com/tomnomnom/assetfinder@latest
        GO111MODULE=on go install github.com/owasp-amass/amass/v3/...@latest
        go install github.com/projectdiscovery/chaos-client/cmd/chaos@latest
    - name: Run Subdomain Script
      run: |
        python3 subs.py "${{ github.event.inputs.domain }}" "${{ github.event.inputs.pd_api_key }}"
    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: all_subs
        path: all_subs.txt
